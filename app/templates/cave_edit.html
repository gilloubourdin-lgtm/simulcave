{% extends "base.html" %}

{% block content %}

<h2>Modifier la cave</h2>

<form method="post">

    <label>Nom de la cave</label>
    <input type="text"
           name="name"
           value="{{ cave.name }}"
           required>

    <label>Région climatique de secours</label>
    <select name="region" required>
    {% for region in [
        "Argovie", "Appenzell Rhodes-Extérieures", "Appenzell Rhodes-Intérieures",
        "Bâle-Campagne", "Bâle-Ville", "Berne", "Fribourg", "Genève",
        "Glaris", "Grisons", "Jura", "Lucerne", "Neuchâtel", "Nidwald",
        "Obwald", "Schaffhouse", "Schwyz", "Soleure", "Saint-Gall",
        "Tessin", "Thurgovie", "Uri", "Valais", "Vaud", "Zoug", "Zurich"
    ] %}
        <option value="{{ region }}" {% if cave.region == region %}selected{% endif %}>
        {{ region }}
        </option>
    {% endfor %}
    </select>

    <label>Coût énergie [CHF/kWh]</label>
    <input type="number"
           step="0.01"
           name="energy_price_chf_per_kwh"
           value="{{ cave.energy_price_chf_per_kwh or 0.31 }}"
           required>

    <label>Facteur CO₂ énergie [kgCO₂/kWh]</label>
    <input type="number"
           step="0.001"
           name="co2_factor_kg_per_kwh"
           value="{{ cave.co2_factor_kg_per_kwh or 0.003 }}"
           required>

    <section>
        <h3>Ventilation / renouvellement d’air</h3>

        <label class="checkbox-label">
            <input type="checkbox"
                   class="checkbox-input"
                   name="ventilation_enabled"
                   {% if cave.ventilation_enabled %}checked{% endif %}>
            Activer le renouvellement d’air
        </label>

        <label>Renouvellement d’air [vol/h]</label>
        <input type="number"
               step="0.01"
               min="0"
               name="ventilation_rate_ach"
               value="{{ cave.ventilation_rate_ach or 0.10 }}"
               {% if not cave.ventilation_enabled %}disabled{% endif %}
               id="ventilation_rate_ach">

        <p class="help-text">
            0.05 = cave très étanche<br>
            0.10 = cave enterrée classique<br>
            0.20 = cave standard<br>
            0.50+ = ventilation mécanique importante
        </p>
    </section>

    <button type="submit">
        Enregistrer les modifications
    </button>

</form>

<script>
const ventilationCheckbox = document.querySelector(
    'input[name="ventilation_enabled"]'
);

const ventilationInput = document.getElementById(
    "ventilation_rate_ach"
);

function updateVentilationField() {
    ventilationInput.disabled = !ventilationCheckbox.checked;
}

ventilationCheckbox.addEventListener(
    "change",
    updateVentilationField
);

updateVentilationField();
</script>

{% endblock %}
