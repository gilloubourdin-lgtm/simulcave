{% extends "base.html" %}

{% block content %}
<h2>Créer une cave</h2>

<form method="post" action="/caves">
  <section>
    <h3>Informations générales</h3>

    <label>Nom</label>
    <input type="text" name="name" required>

    <h3>Météo et localisation</h3>

      <label>Adresse de la cave</label>
      <input
        type="text"
        name="address"
        placeholder="Ex. Route de Duillier 50, Changins, Suisse"
      >

      <label>
        <input type="checkbox" name="use_dynamic_weather" value="true">
        Utiliser la météo dynamique Open-Meteo via coordonnées GPS
      </label>

      <label>Région climatique de secours</label>
      <select name="region" required>
        <option value="Vaud">Vaud</option>
        <option value="Genève">Genève</option>
        <option value="Valais">Valais</option>
        <option value="Fribourg">Fribourg</option>
        <option value="Tessin">Tessin</option>
        <option value="Zurich">Zurich</option>
        <option value="Alpes">Alpes</option>
      </select>

      <label>Altitude [m]</label>
      <input type="number" step="1" name="altitude_m" value="500" required>
    

    <label>Longueur [m]</label>
    <input type="number" step="0.1" name="length_m" required>

    <label>Largeur [m]</label>
    <input type="number" step="0.1" name="width_m" required>

    <label>Hauteur [m]</label>
    <input type="number" step="0.1" name="height_m" required>

    <label>Niveau d’enterrement</label>
    <select name="buried_factor">
      <option value="1.0">Non enterrée</option>
      <option value="0.7">Semi-enterrée</option>
      <option value="0.4">Enterrée</option>
    </select>

    <label>Nombre de zones</label>
    <input type="number" name="zone_count" min="1" max="20" value="1" required>
  </section>

  <section>
    <h3>Parois verticales</h3>

    <h4>Mur Nord</h4>
    <label>Matériau</label>
    <select name="wall_n_material">
      <option>Pierre</option>
      <option>Brique</option>
      <option>Béton</option>
      <option>Bois</option>
      <option>Métal-bois</option>
      <option>Panneau isolé</option>
    </select>
    <label>Valeur U [W/m²K]</label>
    <input type="number" step="0.01" name="wall_n_u" value="1.4" required>

    <h4>Mur Sud</h4>
    <label>Matériau</label>
    <select name="wall_s_material">
      <option>Pierre</option>
      <option>Brique</option>
      <option>Béton</option>
      <option>Bois</option>
      <option>Métal-bois</option>
      <option>Panneau isolé</option>
    </select>
    <label>Valeur U [W/m²K]</label>
    <input type="number" step="0.01" name="wall_s_u" value="1.4" required>

    <h4>Mur Est</h4>
    <label>Matériau</label>
    <select name="wall_e_material">
      <option>Pierre</option>
      <option>Brique</option>
      <option>Béton</option>
      <option>Bois</option>
      <option>Métal-bois</option>
      <option>Panneau isolé</option>
    </select>
    <label>Valeur U [W/m²K]</label>
    <input type="number" step="0.01" name="wall_e_u" value="1.4" required>

    <h4>Mur Ouest</h4>
    <label>Matériau</label>
    <select name="wall_w_material">
      <option>Pierre</option>
      <option>Brique</option>
      <option>Béton</option>
      <option>Bois</option>
      <option>Métal-bois</option>
      <option>Panneau isolé</option>
    </select>
    <label>Valeur U [W/m²K]</label>
    <input type="number" step="0.01" name="wall_w_u" value="1.4" required>
  </section>

  <section>
    <h3>Toiture et sol</h3>

    <h4>Toiture</h4>
    <label>Matériau</label>
    <select name="roof_material">
      <option>Béton</option>
      <option>Bois</option>
      <option>Panneau isolé</option>
      <option>Métal-bois</option>
    </select>
    <label>Valeur U [W/m²K]</label>
    <input type="number" step="0.01" name="roof_u" value="0.8" required>

    <h4>Sol</h4>
    <label>Matériau</label>
    <select name="floor_material">
      <option>Béton</option>
      <option>Pierre</option>
      <option>Terre battue</option>
      <option>Dalle isolée</option>
    </select>
    <label>Valeur U [W/m²K]</label>
    <input type="number" step="0.01" name="floor_u" value="0.6" required>
  </section>

  <section>
    <h3>Énergie, coûts et CO₂</h3>

    <label>Source d’énergie principale</label>
    <select name="energy_source" required>
        <option value="electricity">Électricité</option>
        <option value="heat_pump">Pompe à chaleur</option>
        <option value="gas">Gaz</option>
        <option value="oil">Mazout</option>
    </select>

    <label>Prix énergie [CHF/kWh]</label>
    <input
        type="number"
        step="0.01"
        name="energy_price_chf_per_kwh"
        value="0.24"
        required
    >

    <label>Facteur CO₂ [kgCO₂/kWh]</label>
    <input
        type="number"
        step="0.01"
        name="co2_factor_kg_per_kwh"
        value="0.09"
        required
    >
    </section>

  <button type="submit">Créer la cave</button>
</form>

<script>
const materialUValues = {
  "Pierre": 1.8,
  "Brique": 1.4,
  "Béton": 1.7,
  "Bois": 0.8,
  "Métal-bois": 1.2,
  "Panneau isolé": 0.25,
  "Terre battue": 1.5,
  "Dalle isolée": 0.35
};

function connectMaterialToU(materialName, uName) {
  const materialInput = document.querySelector(`[name="${materialName}"]`);
  const uInput = document.querySelector(`[name="${uName}"]`);

  if (!materialInput || !uInput) return;

  materialInput.addEventListener("change", function () {
    const selected = materialInput.value;

    if (materialUValues[selected] !== undefined) {
      uInput.value = materialUValues[selected];
    }
  });
}

connectMaterialToU("wall_n_material", "wall_n_u");
connectMaterialToU("wall_s_material", "wall_s_u");
connectMaterialToU("wall_e_material", "wall_e_u");
connectMaterialToU("wall_w_material", "wall_w_u");
connectMaterialToU("roof_material", "roof_u");
connectMaterialToU("floor_material", "floor_u");
</script>

{% endblock %}
